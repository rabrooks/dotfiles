# Enable true color support
set -as terminal-features ",xterm-256color:RGB"

unbind r 
bind r source-file ~/.tmux.conf

# Set Leader Key to Control+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
# Plugin Management
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'


# Window Naming Configuration
# Disable automatic window renaming
set-option -g allow-rename off
set-window-option -g automatic-rename off

# Prevent programs from changing window names
set-option -g set-titles off

# Tell tmux to ignore escape sequences that rename windows
# This is more comprehensive for iTerm2
set -g terminal-overrides ",xterm*:XT@:Ms=\\E]52;%p1%s;%p2%s\\007"
set -ga terminal-overrides ",*256col*:XT@"
set -ga terminal-overrides ",alacritty:XT@"
set -ga terminal-overrides ",iTerm2:XT@"


# Status Bar Configuration
# Minimal Catppuccin Macchiato themed status bar
# Colors from Catppuccin Macchiato
set -g status-style "bg=#1e2030,fg=#cad3f5"
set -g status-left-length 30
set -g status-right-length 100

# Left side: Session name with icon
set -g status-left "#[fg=#8aadf4,bold]  #S #[fg=#6e738d]│ "

# Right side: Path, Git branch (if in repo), and time
set -g status-right "#[fg=#6e738d]│ #[fg=#a6da95]󰉋 #{b:pane_current_path} #[fg=#6e738d]│ #[fg=#f5a97f] %H:%M "

# Add activity monitoring
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#ed8796"

# Show pane numbers longer
set -g display-panes-time 2000

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Window status formats
set -g window-status-format "#[fg=#6e738d] #I #[fg=#939ab7]#W "
set -g window-status-current-format "#[fg=#8aadf4,bold] #I #[fg=#cad3f5,bold]#W "
set -g window-status-separator ""

# Status bar positioning and styling
set -g status-position bottom
set -g status-justify left

# Pane borders with Catppuccin colors
set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#8aadf4"

# Message styling
set -g message-style "bg=#363a4f,fg=#cad3f5"
set -g message-command-style "bg=#363a4f,fg=#cad3f5"


# Mouse and Copy Mode Configuration
# Add Mouse support
set -g mouse on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Initialize tmux plugin manager (keep this at the bottom)
run '~/.tmux/plugins/tpm/tpm'